name: Build Windows executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
      - name: Run tests
        run: python -m pytest
      - name: Build executable
        run: pyinstaller --noconfirm --clean --onefile --windowed --name NanoVNA-Screenshot-Exporter run.py
      - name: Create SHA-256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist/NanoVNA-Screenshot-Exporter.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  NanoVNA-Screenshot-Exporter.exe" | Set-Content -Encoding ascii "dist/NanoVNA-Screenshot-Exporter.exe.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: NanoVNA-Screenshot-Exporter-Windows
          path: |
            dist/NanoVNA-Screenshot-Exporter.exe
            dist/NanoVNA-Screenshot-Exporter.exe.sha256
      - name: Attach files to tagged release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" --title "NanoVNA Screenshot Exporter ${{ github.ref_name }}" --generate-notes
          }
          gh release upload "${{ github.ref_name }}" "dist/NanoVNA-Screenshot-Exporter.exe" "dist/NanoVNA-Screenshot-Exporter.exe.sha256" --clobber --repo "${{ github.repository }}"
