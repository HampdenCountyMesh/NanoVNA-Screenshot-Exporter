name: Build Windows executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
      - name: Run tests
        run: python -m pytest
      - name: Build executable
        run: pyinstaller --noconfirm --clean --onefile --windowed --name NanoVNA-Screenshot-Exporter run.py
      - uses: actions/upload-artifact@v4
        with:
          name: NanoVNA-Screenshot-Exporter-Windows
          path: dist/NanoVNA-Screenshot-Exporter.exe
